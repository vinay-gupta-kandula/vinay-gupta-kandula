<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Dark Tech Gradient Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070A10" />
    </linearGradient>

    <!-- Neon Cyan Flow Gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE" stop-opacity="0" />
      <stop offset="50%" stop-color="#4FACFE" stop-opacity="1" />
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0" />
    </linearGradient>

    <!-- Matrix Green Grid Pattern -->
    <pattern id="techGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1F2937" stroke-width="0.7" />
    </pattern>

    <!-- Glow Filter for Neon Elements -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Typography Styles */
    .title-text {
      font-family: 'Fira Code', monospace, sans-serif;
      font-weight: 800;
      font-size: 38px;
      fill: #FFFFFF;
      letter-spacing: 2px;
    }
    .subtitle-text {
      font-family: 'Fira Code', monospace, sans-serif;
      font-weight: 500;
      font-size: 14px;
      fill: #38BDF8;
      letter-spacing: 4px;
    }
    .console-text {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      fill: #10B981;
    }

    /* SVG Keyframe Animations */
    @keyframes pulseNode {
      0%, 100% { r: 4px; fill: #38BDF8; filter: drop-shadow(0 0 2px #38BDF8); }
      50% { r: 7px; fill: #10B981; filter: drop-shadow(0 0 8px #10B981); }
    }
    @keyframes lineFlow {
      to { stroke-dashoffset: -40; }
    }
    @keyframes floatGraphic {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    @keyframes matrixGlitch {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 0.3; }
    }
    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Class assignments to triggers */
    .pulsing-node { animation: pulseNode 3s infinite ease-in-out; }
    .node-delay-1 { animation-delay: 1s; }
    .node-delay-2 { animation-delay: 2s; }
    
    .animated-path {
      stroke-dasharray: 8, 8;
      animation: lineFlow 2s linear infinite;
    }
    .data-stream {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: lineFlow 5s linear infinite;
    }
    .floating-group { animation: floatGraphic 6s infinite ease-in-out; }
    .glitch-line { animation: matrixGlitch 4s infinite ease-in-out; }
    .cursor { animation: cursorBlink 1s infinite; }
  </style>

  <!-- Background Base -->
  <rect width="800" height="250" fill="url(#bgGrad)" />
  <rect width="800" height="250" fill="url(#techGrid)" />

  <!-- Radial Cyber Glow Backdrop -->
  <circle cx="650" cy="125" r="180" fill="#00F2FE" opacity="0.06" filter="blur(40px)" />
  <circle cx="150" cy="125" r="150" fill="#10B981" opacity="0.04" filter="blur(40px)" />

  <!-- Data Flow / Wave Vectors (Left Hand Side) -->
  <g opacity="0.25">
    <path d="M-50 180 C 100 120, 150 220, 300 150 C 450 80, 500 210, 650 160 T 850 140" fill="none" stroke="url(#cyanGrad)" stroke-width="4" class="animated-path" />
    <path d="M-50 150 C 120 180, 180 110, 320 190 C 460 270, 520 130, 680 170 T 850 190" fill="none" stroke="#10B981" stroke-width="1.5" stroke-dasharray="5 10" class="animated-path" style="animation-duration: 4s;" />
  </g>

  <!-- Animated Neural Network Network (Right Side Visual) -->
  <g class="floating-group" transform="translate(480, 20)">
    <!-- Connection Paths -->
    <line x1="120" y1="60" x2="190" y2="40" stroke="#1F2937" stroke-width="1.5" />
    <line x1="120" y1="60" x2="170" y2="120" stroke="#1F2937" stroke-width="1.5" />
    <line x1="190" y1="40" x2="260" y2="80" stroke="#38BDF8" stroke-width="1.5" opacity="0.4" stroke-dasharray="4" class="animated-path" />
    <line x1="170" y1="120" x2="260" y2="80" stroke="#1F2937" stroke-width="1.5" />
    <line x1="170" y1="120" x2="210" y2="190" stroke="#10B981" stroke-width="1.5" opacity="0.4" stroke-dasharray="4" class="animated-path" />
    <line x1="260" y1="80" x2="210" y2="190" stroke="#1F2937" stroke-width="1.5" />
    
    <!-- Data Points / Nodes -->
    <circle cx="120" cy="60" r="5" class="pulsing-node" />
    <circle cx="190" cy="40" r="5" class="pulsing-node node-delay-1" />
    <circle cx="170" cy="120" r="5" class="pulsing-node node-delay-2" />
    <circle cx="260" cy="80" r="5" class="pulsing-node" />
    <circle cx="210" cy="190" r="5" class="pulsing-node node-delay-1" />
    
    <!-- Halos around Nodes -->
    <circle cx="260" cy="80" r="12" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0.3" stroke-dasharray="2" />
    <circle cx="120" cy="60" r="15" fill="none" stroke="#10B981" stroke-width="1" opacity="0.2" />
  </g>

  <!-- Terminal Analytics Overlay (Left Side Visual) -->
  <g transform="translate(60, 50)" class="glitch-line">
    <rect width="260" height="150" rx="6" fill="#0A0D14" stroke="#1F2937" stroke-width="1.5" />
    <!-- Window Controls -->
    <circle cx="15" cy="15" r="4" fill="#EF4444" />
    <circle cx="27" cy="15" r="4" fill="#FBBF24" />
    <circle cx="39" cy="15" r="4" fill="#10B981" />
    <!-- Console Lines -->
    <text x="15" y="45" class="console-text">&gt; import kandula_vinay_gupta as kvg</text>
    <text x="15" y="65" class="console-text">&gt; kvg.get_active_focus()</text>
    <text x="15" y="85" class="console-text" fill="#38BDF8">['Data Science', 'Data Analytics']</text>
    <text x="15" y="105" class="console-text">&gt; kvg.metrics.evaluate_accuracy()</text>
    <text x="15" y="125" class="console-text" fill="#FCD34D">&gt; Accuracy: 98.42% <tspan class="cursor" fill="#FFFFFF">█</tspan></text>
  </g>

  <!-- Main Central Brand Headers -->
  <g transform="translate(335, 115)">
    <!-- Glowing Shadow Layer -->
    <text x="0" y="0" class="title-text" filter="url(#neonGlow)" opacity="0.3" fill="#38BDF8">KANDULA VINAY GUPTA</text>
    <!-- Sharp Vector Layer -->
    <text x="0" y="0" class="title-text">KANDULA VINAY GUPTA</text>
    <!-- Subtitle Data Science Vibe -->
    <text x="4" y="32" class="subtitle-text">DATA SCIENCE • DATA ANALYTICS</text>
  </g>

  <!-- Glowing Accent Boundaries -->
  <rect x="0" y="0" width="800" height="3" fill="#38BDF8" opacity="0.8" filter="url(#neonGlow)" />
  <rect x="0" y="247" width="800" height="3" fill="#10B981" opacity="0.8" filter="url(#neonGlow)" />
</svg>
